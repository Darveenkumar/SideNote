
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  .glass-wrap {
    width: 100%;
    box-sizing: border-box;
    background: rgba(15, 15, 15, 0.15);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-radius: 16px;
    padding: 1px;
    position: relative;
    z-index: 1;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    overflow: visible;
  }
  .glass-wrap::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 16px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.02) 40%, rgba(0,220,255,0.1));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    z-index: 2;
  }
  .glass-inner {
    background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.2));
    border-radius: 15px;
    display: flex;
    align-items: center;
    gap: 0;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    min-height: 88px;
    z-index: 3;
  }
  .glass-inner::after {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    border-radius: 99px;
  }
  .glass-inner:hover {
    background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(0,220,255,0.05));
    box-shadow: inset 0 0 20px rgba(0,220,255,0.05);
  }

  .cleo-slot {
    flex-shrink: 0;
    width: 100px;
    height: 88px;
    position: relative;
    overflow: visible;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cleo-head {
    width: 72px;
    height: 72px;
    position: relative;
    transform-origin: bottom center;
    animation: jumpShake 3.5s infinite;
    filter: drop-shadow(0 8px 18px rgba(0,180,255,0.25));
  }
  @keyframes jumpShake {
    0%, 70%, 100% { transform: translateY(0) rotate(0deg); }
    10%  { transform: translateY(-14px) rotate(-6deg); }
    20%  { transform: translateY(-14px) rotate(6deg); }
    30%  { transform: translateY(-5px) rotate(-4deg); }
    40%  { transform: translateY(-10px) rotate(4deg); }
    50%  { transform: translateY(0) rotate(-2deg); }
    55%  { transform: translateY(-4px) rotate(2deg); }
    60%  { transform: translateY(0) rotate(0deg); }
  }

  .divider-line {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent);
    flex-shrink: 0;
    margin-right: 16px;
    z-index: 2;
  }
  .text-block {
    flex: 1;
    min-width: 0;
    padding: 18px 16px 18px 0;
    z-index: 2;
  }
  .top-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .label-tag {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #00dcff;
    background: rgba(0,220,255,0.08);
    border: 1px solid rgba(0,220,255,0.15);
    border-radius: 4px;
    padding: 2px 8px;
    box-shadow: 0 0 10px rgba(0,220,255,0.1);
  }
  .main-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #ffffff;
    margin: 0 0 6px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .sub-text {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    margin: 0;
    line-height: 1.5;
  }
  .chevron-col {
    flex-shrink: 0;
    padding-right: 20px;
    color: rgba(255,255,255,0.4);
    transition: transform 0.25s, color 0.2s, filter 0.2s;
    z-index: 2;
  }
  .chevron-col.open {
    transform: rotate(180deg);
    color: #00dcff;
    filter: drop-shadow(0 0 6px rgba(0,220,255,0.4));
  }
  .detail-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  .detail-panel.open { max-height: 120px; }
  .detail-inner {
    padding: 12px 20px 16px 116px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
    background: linear-gradient(180deg, rgba(0,0,0,0.1), transparent);
  }
  .detail-inner a {
    color: #00dcff;
    text-decoration: none;
    border-bottom: 1px dashed rgba(0,220,255,0.4);
    transition: border-color 0.15s ease, color 0.15s ease, text-shadow 0.15s ease;
  }
  .detail-inner a:hover {
    border-color: #00dcff;
    color: #fff;
    text-shadow: 0 0 8px rgba(0,220,255,0.6);
  }
</style>

<div class="glass-wrap">
  <div class="glass-inner" onclick="togglePanel()" role="button" aria-expanded="false" id="main-card" tabindex="0">

    <div class="cleo-slot">
      <div class="cleo-head">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
          <defs>
            <radialGradient id="hGrad" cx="36%" cy="26%" r="68%">
              <stop offset="0%" stop-color="#f4fcff"/>
              <stop offset="45%" stop-color="#bce3f8"/>
              <stop offset="100%" stop-color="#73bae2"/>
            </radialGradient>
            <radialGradient id="vGrad" gradientUnits="userSpaceOnUse" cx="100" cy="100" r="96">
              <stop offset="0%" stop-color="#1f63a8"/>
              <stop offset="50%" stop-color="#093058"/>
              <stop offset="100%" stop-color="#03102a"/>
            </radialGradient>
            <radialGradient id="earGlowH" cx="40%" cy="35%" r="60%">
              <stop offset="0%" stop-color="#ff859a"/>
              <stop offset="75%" stop-color="#f04156"/>
              <stop offset="100%" stop-color="#b31b2c"/>
            </radialGradient>
            <radialGradient id="rGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ff7388" stop-opacity="0.65"/>
              <stop offset="100%" stop-color="#f04156" stop-opacity="0"/>
            </radialGradient>
            <filter id="hShadow"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="rgba(0,0,0,.3)"/></filter>
            <filter id="hBigGlow"><feGaussianBlur stdDeviation="4" result="bl"/><feMerge><feMergeNode in="bl"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <pattern id="hScanlines" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
              <rect width="1" height="1" fill="rgba(0,0,0,0.08)"/>
            </pattern>
          </defs>

          <ellipse cx="100" cy="100" rx="68" ry="64" fill="url(#hGrad)" filter="url(#hShadow)"/>

          <rect x="98" y="30" width="4" height="10" rx="2" fill="#00dcff"/>
          <ellipse cx="100" cy="29" rx="6" ry="5" fill="#00dcff" filter="url(#hBigGlow)"/>

          <circle cx="26"  cy="104" r="14" fill="url(#earGlowH)" filter="url(#hShadow)"/>
          <circle cx="174" cy="104" r="14" fill="url(#earGlowH)" filter="url(#hShadow)"/>

          <rect x="38" y="74" width="124" height="62" rx="28" fill="url(#vGrad)"/>
          <rect x="38" y="74" width="124" height="62" rx="28" fill="url(#hScanlines)"/>

          <ellipse cx="54"  cy="118" rx="10" ry="5" fill="url(#rGrad)"/>
          <ellipse cx="146" cy="118" rx="10" ry="5" fill="url(#rGrad)"/>

          <circle cx="72" cy="104" r="14" fill="white"/>
          <circle cx="72" cy="104" r="9.5" fill="#081022"/>
          <circle cx="69.5" cy="101.5" r="3.2" fill="white"/>
          <circle cx="75" cy="107" r="1.5" fill="white" opacity="0.6"/>

          <circle cx="128" cy="104" r="14" fill="white"/>
          <circle cx="128" cy="104" r="9.5" fill="#081022"/>
          <circle cx="125.5" cy="101.5" r="3.2" fill="white"/>
          <circle cx="131" cy="107" r="1.5" fill="white" opacity="0.6"/>

          <ellipse id="h-lidLtop" cx="72"  cy="104" rx="14" ry="0" fill="url(#vGrad)"/>
          <ellipse id="h-lidLbot" cx="72"  cy="104" rx="14" ry="0" fill="url(#vGrad)"/>
          <ellipse id="h-lidRtop" cx="128" cy="104" rx="14" ry="0" fill="url(#vGrad)"/>
          <ellipse id="h-lidRbot" cx="128" cy="104" rx="14" ry="0" fill="url(#vGrad)"/>

          <path d="M90 122 Q100 132 110 122" stroke="#5ef0ff" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
    </div>

    <div class="divider-line"></div>

    <div class="text-block">
      <div class="top-row">
        <span class="label-tag">Auto-Refresh</span>
      </div>
      <p class="main-title">📈 Fresh charts roll out every morning at 9:00 AM.</p>
      <p class="sub-text">All data changes will reflect after the next refresh cycle.</p>
    </div>

    <div class="chevron-col" id="chev" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>
  </div>

  <div class="detail-panel" id="detail">
    <div class="detail-inner">
      Allow a few minutes past the hour for all charts to fully propagate. If your changes are still not updated after 9:00 AM, please reach out to <a href="mailto:darveenkumar.mohan@mcmc.gov.my?subject=Core%20Hub%20Chart%20Issue&body=Hi%20Darveen%2C%0D%0A%0D%0AI%20would%20like%20to%20report%20an%20issue%20with%20a%20Core%20Hub%20chart.%0D%0A%0D%0AChart%20name%3A%0D%0A%0D%0AIssue%20type%3A%0D%0A-%20Data%20not%20updated%0D%0A-%20Incorrect%20values%0D%0A-%20Missing%20data%0D%0A-%20Chart%20not%20loading%0D%0A-%20Visual%20formatting%20issue%0D%0A%0D%0AIssue%20description%3A%0D%0A%0D%0AScreenshot%3A%20(Attach%20if%20applicable)">Darveen</a> for assistance.
    </div>
  </div>
</div>

<script>
  function togglePanel() {
    var d = document.getElementById('detail');
    var c = document.getElementById('chev');
    var card = document.getElementById('main-card');
    var isOpen = d.classList.contains('open');
    d.classList.toggle('open', !isOpen);
    c.classList.toggle('open', !isOpen);
    card.setAttribute('aria-expanded', String(!isOpen));
  }
  document.getElementById('main-card').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePanel(); }
  });

  function blink() {
    var eyes = [
      { top: 'h-lidLtop', bot: 'h-lidLbot', cy: 104 },
      { top: 'h-lidRtop', bot: 'h-lidRbot', cy: 104 }
    ];
    var steps = 0, MAX = 8, MAX_RY = 14;
    var ci = setInterval(function() {
      steps++;
      eyes.forEach(function(e) {
        var t = document.getElementById(e.top), b = document.getElementById(e.bot);
        if (!t || !b) return;
        var ry = (steps / MAX) * MAX_RY;
        t.setAttribute('ry', ry); t.setAttribute('cy', e.cy + ry);
        b.setAttribute('ry', ry * 0.6); b.setAttribute('cy', e.cy - ry * 0.6);
      });
      if (steps >= MAX) {
        clearInterval(ci); steps = 0;
        setTimeout(function() {
          var oi = setInterval(function() {
            steps++;
            eyes.forEach(function(e) {
              var t = document.getElementById(e.top), b = document.getElementById(e.bot);
              if (!t || !b) return;
              var ry = (1 - steps / 12) * MAX_RY;
              t.setAttribute('ry', ry); t.setAttribute('cy', e.cy + ry);
              b.setAttribute('ry', ry * 0.6); b.setAttribute('cy', e.cy - ry * 0.6);
            });
            if (steps >= 12) {
              clearInterval(oi);
              eyes.forEach(function(e) {
                var t = document.getElementById(e.top), b = document.getElementById(e.bot);
                if (t) { t.setAttribute('ry', 0); t.setAttribute('cy', e.cy); }
                if (b) { b.setAttribute('ry', 0); b.setAttribute('cy', e.cy); }
              });
              setTimeout(blink, 2500 + Math.random() * 3000);
            }
          }, 150 / 12);
        }, 45);
      }
    }, 70 / MAX);
  }
  setTimeout(blink, 1500);
</script>

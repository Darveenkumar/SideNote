<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Space+Mono&display=swap');

  .glass-wrap {
    width: 100%;
    box-sizing: border-box;
    /* Liquid Glass Foundation */
    background: rgba(15, 15, 15, 0.15);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-radius: 16px;
    padding: 1px;
    position: relative;
    z-index: 1;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    overflow: visible;
  }
  
  /* Refractive glass border effect */
  .glass-wrap::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 16px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.02) 40%, rgba(0,220,255,0.1));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    z-index: 2;
  }
  
  .glass-inner {
    /* Subtle internal liquid gradient */
    background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.2));
    border-radius: 15px;
    display: flex;
    align-items: center;
    gap: 0;
    cursor: pointer;
    position: relative;
    overflow: hidden; 
    transition: background 0.3s ease, box-shadow 0.3s ease;
    min-height: 88px;
    z-index: 3;
  }
  
  /* Top reflection highlight */
  .glass-inner::after {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    border-radius: 99px;
  }
  
  .glass-inner:hover { 
    background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(0, 220, 255, 0.05));
    box-shadow: inset 0 0 20px rgba(0, 220, 255, 0.05);
  }

  .cleo-slot {
    flex-shrink: 0;
    width: 110px; 
    height: 88px;
    position: relative;
    overflow: visible;
  }
  
  .cleo-slot svg {
    position: absolute;
    bottom: -2px;
    left: 50%;
    width: 80px;
    animation: cleoFlyHorizontal 6s ease-in-out infinite;
    filter: drop-shadow(0 8px 18px rgba(0,180,255,0.25));
  }
  
  @keyframes cleoFlyHorizontal {
    0%   { transform: translateX(-80%) translateY(0px) rotate(-3deg); }
    50%  { transform: translateX(-20%) translateY(-4px) rotate(3deg); }
    100% { transform: translateX(-80%) translateY(0px) rotate(-3deg); }
  }

  .flame-outer { animation: flameFlick 0.14s ease-in-out infinite alternate; transform-origin: 140px 265px; }
  .flame-inner { animation: flameFlick2 0.09s ease-in-out infinite alternate; transform-origin: 140px 265px; }
  @keyframes flameFlick  { 0% { transform: scaleX(0.94) scaleY(0.93); opacity:0.82; } 100% { transform: scaleX(1.06) scaleY(1.07); opacity:1; } }
  @keyframes flameFlick2 { 0% { transform: scaleX(0.92) scaleY(0.95); } 100% { transform: scaleX(1.08) scaleY(1.05); } }

  .divider-line {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent);
    flex-shrink: 0;
    margin-right: 16px;
    z-index: 2; 
  }

  .text-block {
    flex: 1;
    min-width: 0;
    padding: 18px 16px 18px 0;
    z-index: 2;
  }
  
  .top-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  
  .label-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #00dcff;
    background: rgba(0, 220, 255, 0.08);
    border: 1px solid rgba(0, 220, 255, 0.15);
    border-radius: 4px;
    padding: 2px 8px;
    box-shadow: 0 0 10px rgba(0, 220, 255, 0.1);
  }
  
  .main-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #ffffff;
    margin: 0 0 6px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  
  .sub-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.6);
    margin: 0;
    line-height: 1.5;
  }

  .chevron-col {
    flex-shrink: 0;
    padding-right: 20px;
    color: rgba(255,255,255,0.4);
    transition: transform 0.25s, color 0.2s, filter 0.2s;
    z-index: 2;
  }
  
  .chevron-col.open { 
    transform: rotate(180deg); 
    color: #00dcff; 
    filter: drop-shadow(0 0 6px rgba(0,220,255,0.4));
  }

  .detail-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  
  .detail-panel.open { 
    max-height: 120px; 
  }
  
  .detail-inner {
    padding: 12px 20px 16px 126px; 
    border-top: 1px solid rgba(255,255,255,0.06);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.55);
    line-height: 1.6;
    background: linear-gradient(180deg, rgba(0,0,0,0.1), transparent);
  }
  
  .detail-inner a {
    color: #00dcff;
    text-decoration: none;
    border-bottom: 1px dashed rgba(0, 220, 255, 0.4);
    transition: border-color 0.15s ease, color 0.15s ease, text-shadow 0.15s ease;
  }
  
  .detail-inner a:hover { 
    border-color: #00dcff; 
    color: #fff;
    text-shadow: 0 0 8px rgba(0,220,255,0.6);
  }
</style>

<script>
  function togglePanel() {
    var d = document.getElementById('detail');
    var c = document.getElementById('chev');
    var card = document.getElementById('main-card');
    var isOpen = d.classList.contains('open');
    d.classList.toggle('open', !isOpen);
    c.classList.toggle('open', !isOpen);
    card.setAttribute('aria-expanded', String(!isOpen));
  }
  
  document.getElementById('main-card').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { 
      e.preventDefault(); 
      togglePanel(); 
    }
  });

  function blink() {
    var eyes = [
      { top: 'nb-lidLtop', bot: 'nb-lidLbot', cy: 84 },
      { top: 'nb-lidRtop', bot: 'nb-lidRbot', cy: 84 }
    ];
    var steps = 0, MAX = 8, MAX_RY = 14;
    var ci = setInterval(function() {
      steps++;
      eyes.forEach(function(e) {
        var t = document.getElementById(e.top), b = document.getElementById(e.bot);
        if (!t || !b) return;
        var ry = (steps / MAX) * MAX_RY;
        t.setAttribute('ry', ry); t.setAttribute('cy', e.cy + ry);
        b.setAttribute('ry', ry * 0.6); b.setAttribute('cy', e.cy - ry * 0.6);
      });
      if (steps >= MAX) {
        clearInterval(ci); steps = 0;
        setTimeout(function() {
          var oi = setInterval(function() {
            steps++;
            eyes.forEach(function(e) {
              var t = document.getElementById(e.top), b = document.getElementById(e.bot);
              if (!t || !b) return;
              var ry = (1 - steps / 12) * MAX_RY;
              t.setAttribute('ry', ry); t.setAttribute('cy', e.cy + ry);
              b.setAttribute('ry', ry * 0.6); b.setAttribute('cy', e.cy - ry * 0.6);
            });
            if (steps >= 12) {
              clearInterval(oi);
              eyes.forEach(function(e) {
                var t = document.getElementById(e.top), b = document.getElementById(e.bot);
                if (t) { t.setAttribute('ry', 0); t.setAttribute('cy', e.cy); }
                if (b) { b.setAttribute('ry', 0); b.setAttribute('cy', e.cy); }
              });
              setTimeout(blink, 2500 + Math.random() * 3000);
            }
          }, 150 / 12);
        }, 45);
      }
    }, 70 / MAX);
  }
  setTimeout(blink, 1500);
</script>
